name: phase-1-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install CPU test package
        run: python -m pip install -e '.[dev]'
      - name: Run Phase 1 tests
        run: python -m pytest
